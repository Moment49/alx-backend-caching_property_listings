version: "3"

services:
  api:
    build: .
    container_name: api
    restart: always
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - .:/app 
    ports:
      - "8000:8000"
    depends_on:
      - db
  cache:
    image: redis:latest
    volumes:
      - redis_data:/data
  db:
    image: postgres
    container_name: db
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

volumes:
  db_data:
  redis_data:
    